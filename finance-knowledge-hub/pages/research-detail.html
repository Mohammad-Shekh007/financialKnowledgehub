  <script>
    // ES modules and fetch() are blocked on the file:// protocol, which makes
    // this page silently blank if the HTML file is double-clicked. Explain
    // instead. (This text can't come from site.json here: JSON loading is
    // exactly what file:// blocks.)
    if (window.location.protocol === "file:") {
      document.addEventListener("DOMContentLoaded", function () {
        var main = document.querySelector("main");
        if (!main) return;
        var wrap = document.createElement("div");
        wrap.className = "container section";
        var notice = document.createElement("div");
        notice.className = "notice";
        var title = document.createElement("h2");
        title.textContent = "This site needs a local web server";
        var body = document.createElement("p");
        body.textContent = "You opened this file directly from disk (file://), where browsers block the JavaScript modules and JSON data this site is built on. Serve the folder instead: in VS Code, right-click index.html and choose \u201cOpen with Live Server\u201d \u2014 or run \u201cpython -m http.server\u201d in the project folder and open http://localhost:8000. On GitHub Pages this works automatically.";
        notice.appendChild(title);
        notice.appendChild(body);
        wrap.appendChild(notice);
        main.insertBefore(wrap, main.firstChild);
      });
    }
  </script>
  <script type="module" src="../js/app.js"></script>
